
<!DOCTYPE html>
<html>

<head lang="en">
    <title>Fractal Viewer</title>

    <style>
        * {
            font-size: 22px;
            font-family: Cambria, Cochin, Georgia;
            overflow: hidden;
            user-select: none;
        }

        body {
            background-color: black;
        }

        canvas {
            cursor: move;
            position: absolute;
            left: 0;
            top: 0;
            background: #202020;
        }

        button {
            cursor: pointer;
        }

        span {
            font-size: 18px;
            color: white;
        }
    </style>
</head>

<body>
    <canvas width="0" height="0" oncontextmenu="return false" onmouseover="canvasHover = true"
        onmouseout="canvasHover = false"></canvas>
    <br>
    <div style="position: absolute; top: 20px; left: 20px">
        <button onclick="reset()">Reset</button>
        <button onclick="menu.style.visibility = 'visible'">More...</button>
        <br><span></span>
    </div>
    <div
        style="position: absolute; width: 1200px; max-width: 70%; height: 150px; max-height: 70%; overflow: hidden; left: calc(80px + 10%); top: calc(80px + 10%); background:#505050; border-radius: 15px; visibility: collapse">
        <button onclick="generatePallete()">New Pallete</button>
        <button onclick="flowPallete = !flowPallete">Toggle Flowing Pallete</button>
        <button onclick="if (finished) { banding = (banding + 1) % 3; tempPallete = true }">Change
            Banding Mode</button>
        <button
            onclick="loc.textContent = 'X: ' + panX + ' Y: ' + panY + ' Zoom: ' + zoom + ' Power: ' + (mandelbrot + 2)">Save
            Location</button>
        <button onclick="loadLoc.style.visibility = 'visible'">Load Location</button>
        <button onclick="closeMenu()" style="font-size: 15px; position: absolute; right: 0">Close
            Menu</button>
        <button onclick="download()">Download as image</button>
        <button onclick="mandelbrot = (mandelbrot + 1) % 4; reset(false)">Change Fractal</button>
        <div style="font-size: 20px; user-select: text; cursor: default"></div>
        <div style="visibility: collapse">
            <input placeholder="Enter location:"></input>
            <button onclick="loadLocation()">Go to location</button>
        </div>
    </div>
    <script>
        var now = 0
        const canvas = document.getElementsByTagName("canvas")[0]
        const ctx = canvas.getContext("2d")
        const percent = document.getElementsByTagName("span")[0]
        const menu = document.getElementsByTagName("div")[1]
        const loc = document.getElementsByTagName("div")[2]
        const loadLoc = document.getElementsByTagName("div")[3]
        const newLoc = document.getElementsByTagName("input")[0]
        var colors = [[160, 10, 10], [255, 50, 50], [255, 200, 0], [60, 180, 0], [40, 180, 220], [60, 100, 125], [200, 200, 220], [170, 100, 200], [140, 10, 130], [185, 0, 125], [245, 95, 55], [230, 160, 20], [220, 225, 95], [200, 225, 140], [125, 200, 155], [80, 135, 240], [170, 80, 230], [240, 100, 165], [160, 10, 10]]
        const orgColors = colors
        var max = 1
        var banding = 0
        var flowPallete = false
        var tempPallete = false
        var flowPan = 0
        var drawData = []
        var mandelbrot = 0
        var zoom = 0.0033333333333333333
        var computed = 0
        var finished = true
        var down = false
        var scrollZoom = false
        var scrollUnzoom = false
        var scrollX = 0
        var scrollY = 0
        var currentX = 0
        var currentY = 0
        var w = window.innerWidth
        var h = window.innerHeight
        canvas.width = w
        canvas.height = h
        var px = w * h
        var halfW = -w / 2 - 0.5
        var halfH = -h / 2 - 0.5
        var panX = halfW * zoom - 0.75
        var panY = halfH * zoom
        var canvasHover = false
        var updated = true

        window.onresize = () => {
            w = window.innerWidth
            h = window.innerHeight
            px = w * h
            halfW = -w / 2 - 0.5
            halfH = -h / 2 - 0.5
            canvas.width = w
            canvas.height = h
            updated = true
        }

        window.onmousedown = e => {
            if (canvasHover && e.which === 1) {
                down = true
                currentX = e.clientX
                currentY = e.clientY
            }
        }

        window.onmousemove = e => {
            if (down) {
                updated = true
                panX += (currentX - e.clientX) * zoom
                panY += (currentY - e.clientY) * zoom
            }
            currentX = e.clientX
            currentY = e.clientY
        }

        window.onmouseup = e => down = false

        window.onwheel = e => {
            if (canvasHover && currentX >= 0 && currentY >= 0) {
                if (e.deltaY > 0) {
                    scrollZoom = true
                } else {
                    scrollUnzoom = true
                }
            }
        }

        function draw() {
            if (updated || scrollZoom || scrollUnzoom) {
                var newTime = performance.now()
                if (scrollZoom) {
                    update(0.8)
                    scrollZoom = false
                } else if (scrollUnzoom) {
                    update(1.25)
                    scrollUnzoom = false
                }
                var overZoom = 1 / zoom
                max = Math.ceil(Math.max(5000 * Math.log10(overZoom * 0.00075 + 1))) + 50
                drawData = new Float64Array(px)
                computed = 0
                var image = ctx.createImageData(w, h)
                var data = image.data
                var y = -1
                finished = false
                function tComp(i) {
                    if (updated || scrollZoom || scrollUnzoom) {
                        requestAnimationFrame(draw)
                        return
                    }
                    var maxCompute = 1000000 * (5 - mandelbrot)
                    var end = true
                    var orgY = y
                    var m = i << 2
                    while (i < px) {
                        var x = i % w
                        y += x === 0 ? 1 : 0
                        var value = getPixel(panX + x * zoom, panY + y * zoom, i)
                        data[m] = value[0]
                        data[m + 1] = value[1]
                        data[m + 2] = value[2]
                        data[m + 3] = 255
                        i++
                        if (computed > maxCompute) {
                            computed = 0
                            percent.textContent = (i * 100 / px).toFixed(2) + "%"
                            if (y > orgY) {
                                ctx.putImageData(image, 0, 0)
                                ctx.fillStyle = "white"
                                ctx.fillRect(0, y, w, 1)
                            }
                            setTimeout(tComp, 4, i)
                            return
                        }
                        m += 4
                    }
                    percent.textContent = ""
                    ctx.putImageData(image, 0, 0)
                    finished = true
                    now = performance.now()
                    requestAnimationFrame(draw)
                }
                updated = false
                tComp(0)
            } else {
                var newTime = performance.now()
                if (flowPallete || tempPallete) {
                    var m = 0
                    var image = ctx.createImageData(w, h)
                    var data = image.data
                    var diff = newTime - now
                    if (flowPallete) {
                        flowPan = (flowPan + (diff > 500 ? 0 : diff / 2000)) % 18
                    }
                    tempPallete = false
                    if (banding === 0) {
                        for (var i = 0; i < px; i++, m += 4) {
                            if (drawData[i] > 0) {
                                var log = (drawData[i] + flowPan) % 18
                                var mod = log % 0.25
                                var id = Math.floor(log)
                                var color = getColor(colors[id], colors[id + 1], log - id)
                                data[m] = color[0]
                                data[m + 1] = color[1]
                                data[m + 2] = color[2]
                                data[m + 3] = 255
                            } else if (drawData[i] === 0) {
                                var log = (drawData[i] + flowPan) % 18
                                var id = Math.floor(log)
                                var color = getColor(colors[id], colors[id + 1], log - id)
                                data[m] = color[0]
                                data[m + 1] = color[1]
                                data[m + 2] = color[2]
                                data[m + 3] = 255
                            } else if (drawData[i] === -1) {
                                data[m] = 0
                                data[m + 1] = 0
                                data[m + 2] = 0
                                data[m + 3] = 255
                            }
                        }
                    } else if (banding === 1) {
                        for (var i = 0; i < px; i++, m += 4) {
                            if (drawData[i] > 0) {
                                var log = (drawData[i] + flowPan) % 18
                                var mod = log % 0.25
                                var id = Math.floor(log)
                                var color = getColor(colors[id], colors[id + 1], log - id)
                                if (mod < 0.05) {
                                    data[m] = 192 + (color[0] >> 2)
                                    data[m + 1] = 192 + (color[1] >> 2)
                                    data[m + 2] = 192 + (color[2] >> 2)
                                    data[m + 3] = 255
                                } else {
                                    data[m] = color[0]
                                    data[m + 1] = color[1]
                                    data[m + 2] = color[2]
                                    data[m + 3] = 255
                                }
                            } else if (drawData[i] === 0) {
                                var log = (drawData[i] + flowPan) % 18
                                var id = Math.floor(log)
                                var color = getColor(colors[id], colors[id + 1], log - id)
                                data[m] = color[0]
                                data[m + 1] = color[1]
                                data[m + 2] = color[2]
                                data[m + 3] = 255
                            } else if (drawData[i] === -1) {
                                data[m] = 0
                                data[m + 1] = 0
                                data[m + 2] = 0
                                data[m + 3] = 255
                            }
                        }
                    } else {
                        for (var i = 0; i < px; i++, m += 4) {
                            if (drawData[i] > 0) {
                                var log = (drawData[i] + flowPan) % 18
                                var mod = log % 0.25
                                var id = Math.floor(log)
                                var color = getColor(colors[id], colors[id + 1], log - id)
                                if (mod < 0.05) {
                                    data[m] = 192 + (color[0] >> 2)
                                    data[m + 1] = 192 + (color[1] >> 2)
                                    data[m + 2] = 192 + (color[2] >> 2)
                                    data[m + 3] = 255
                                } else {
                                    if (mod < 0.07) {
                                        var multiplier = (mod - 0.05) * 25 + 0.5
                                        data[m] = color[0] * multiplier
                                        data[m + 1] = color[1] * multiplier
                                        data[m + 2] = color[2] * multiplier
                                        data[m + 3] = 255
                                    } else {
                                        data[m] = color[0]
                                        data[m + 1] = color[1]
                                        data[m + 2] = color[2]
                                        data[m + 3] = 255
                                    }
                                }
                            } else if (drawData[i] === 0) {
                                var log = (drawData[i] + flowPan) % 18
                                var id = Math.floor(log)
                                var color = getColor(colors[id], colors[id + 1], log - id)
                                data[m] = color[0]
                                data[m + 1] = color[1]
                                data[m + 2] = color[2]
                                data[m + 3] = 255
                            } else if (drawData[i] === -1) {
                                data[m] = 0
                                data[m + 1] = 0
                                data[m + 2] = 0
                                data[m + 3] = 255
                            }
                        }
                    }
                    ctx.putImageData(image, 0, 0)
                }
                now = newTime
                requestAnimationFrame(draw)
            }
        }

        function getColor(oldC, newC, bias) {
            var or = oldC[0]
            var og = oldC[1]
            var ob = oldC[2]
            return [Math.floor((newC[0] - or) * bias + or), Math.floor((newC[1] - og) * bias + og), Math.floor((newC[2] - ob) * bias + ob)]
        }

        function getPixel(x, y, pixel) {
            function returnVal() {
                computed += n + 20
                if (n < 1250) {
                    n = (n + 1 - Math.log2(Math.log(Math.sqrt(sr + si))) * ([1, 0.6309297535714575, 0.5, 0.43067655807339306][mandelbrot])) * (2 + mandelbrot)
                }
                if (n <= 6) {
                    drawData[pixel] = 0
                    var id = Math.floor(flowPan)
                    return getColor(colors[id], colors[id + 1], flowPan - id)
                }
                computed += 8
                var org = (Math.log2(n + 2) - 3) * 1.2386126258466668
                var log = (org + flowPan) % 18
                drawData[pixel] = org
                var mod = log % 0.25
                if (mod < 0.05 && banding > 0) {
                    var id = Math.floor(log)
                    var color = getColor(colors[id], colors[id + 1], log - id)
                    return [192 + (color[0] >> 2), 192 + (color[1] >> 2), 192 + (color[2] >> 2)]
                } else {
                    var id = Math.floor(log)
                    var color = getColor(colors[id], colors[id + 1], log - id)
                    if (mod < 0.07 && banding === 2) {
                        var multiplier = (mod - 0.05) * 25 + 0.5
                        color[0] *= multiplier
                        color[1] *= multiplier
                        color[2] *= multiplier
                    }
                    return color
                }
            }
            var r = x
            var i = y
            if (mandelbrot === 0) {
                var sr = r * r
                var si = i * i
                for (var n = 0; n < max; n++) {
                    var tr = r
                    r = sr - si + x
                    i = 2 * tr * i + y
                    sr = r * r
                    si = i * i
                    if (sr + si > 100) {
                        return returnVal()
                    }
                }
            } else if (mandelbrot === 1) {
                var sr = r * r
                var si = i * i
                for (var n = 0; n < max; n++) {
                    r = sr * r - 3 * r * si + x
                    i = 3 * sr * i - i * si + y
                    sr = r * r
                    si = i * i
                    if (sr + si > 100) {
                        return returnVal()
                    }
                }
            } else if (mandelbrot === 2) {
                var sr = r * r
                var si = i * i
                for (var n = 0; n < max; n++) {
                    var tr = r
                    r = sr * sr - 6 * sr * si + si * si + x
                    i = 4 * (sr * tr * i - tr * si * i) + y
                    sr = r * r
                    si = i * i
                    if (sr + si > 100) {
                        return returnVal()
                    }
                }
            } else if (mandelbrot === 3) {
                var sr = r * r
                var si = i * i
                var fr = sr * sr
                var fi = si * si
                for (var n = 0; n < max; n++) {
                    r = fr * r - 10 * sr * r * si + 5 * r * fi + x
                    i = 5 * fr * i - 10 * sr * si * i + fi * i + y
                    sr = r * r
                    si = i * i
                    fr = sr * sr
                    fi = si * si
                    if (sr + si > 100) {
                        return returnVal()
                    }
                }
            }
            computed += max
            drawData[pixel] = -1
            return [0, 0, 0]
        }

        function update(factor) {
            var globalX = panX + currentX * zoom
            var globalY = panY + currentY * zoom
            zoom *= factor
            panX = globalX - currentX * zoom
            panY = globalY - currentY * zoom
        }

        function download() {
            var a = document.createElement("a")
            a.download = "fractal.png"
            a.href = canvas.toDataURL("image/png", 1.0)
            document.body.appendChild(a)
            a.click()
            a.remove()
        }

        function loadLocation() {
            var val = newLoc.value
            var valA = val.indexOf("X: ")
            if (valA !== -1) {
                var valB = val.indexOf(" Y: ")
                if (valB !== -1) {
                    var valC = val.indexOf(" Zoom: ")
                    if (valC !== -1) {
                        var valD = val.indexOf(" Power: ")
                        if (valD !== -1) {
                            var a = parseFloat(val.slice(valA + 3, valB))
                            var b = parseFloat(val.slice(valB + 3, valC))
                            var c = parseFloat(val.slice(valC + 7))
                            var d = parseFloat(val.slice(valD + 8))
                            if (isFinite(a) && isFinite(b) && c > 0 && d > 1 && d < 6) {
                                if (panX !== a || panY !== b || zoom !== c) {
                                    panX = a
                                    panY = b
                                    zoom = c
                                    mandelbrot = d - 2
                                    updated = true
                                }
                            }
                        }
                    }
                }
            }
        }

        function reset(strictReset = true) {
            zoom = 0.0033333333333333333
            panX = halfW * zoom - (mandelbrot === 0 ? 0.75 : 0)
            panY = halfH * zoom
            if (strictReset) {
                flowPallete = false
                flowPan = 0
                colors = orgColors
            }
            updated = true
        }

        function generatePallete() {
            function HSL2RGB(h, s, l) {
                let a = s * l > 0.5 ? 1 - l : l
                let f = (n, k = (n + h / 30) % 12) => l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1)
                return [f(0), f(8), f(4)]
            }

            function control(number, min, max) {
                if (number < min) {
                    return [min, 1]
                } else if (number > max) {
                    return [max, -1]
                }
                return [number, 0]
            }

            var h = Math.floor(Math.random() * 360)
            var hStrength = Math.random() * 35
            var s = 40 + Math.random() * 50
            var l = 40 + Math.random() * 20
            var sBounce = 0
            var lBounce = 0
            var hDir = 1
            var hDirT = 3
            colors = new Array(19)
            for (var i = 0; i < 19; i++) {
                var t
                h += (Math.random() * hStrength + 20) * hDir
                if (sBounce === 1) {
                    s += Math.random() * 12
                } else if (sBounce === -1) {
                    s -= Math.random() * 12
                } else {
                    s += Math.random() * 12 - 6
                    t = control(s, 40, 90)
                    s = t[0]
                    sBounce = t[1]
                }
                if (lBounce === 1) {
                    l += Math.random() * 6
                } else if (lBounce === -1) {
                    l += Math.random() * 6
                } else {
                    l += Math.random() * 6 - 3
                    t = control(l, 40, 60)
                    l = t[0]
                    lBounce = t[1]
                }

                if (hDirT-- < 0) {
                    if (Math.random() < 0.4) {
                        hDir *= -1
                        hDirT = 3
                    }
                }
                var val = HSL2RGB(h, s, l)
                colors[i] = [Math.floor(val[0]), Math.floor(val[1]), Math.floor(val[2])]
                tempPallete = true
            }
        }

        function closeMenu() {
            menu.style.visibility = "collapse"
            loadLoc.style.visibility = "collapse"
            loc.textContent = ""
        }

        onkeydown = e => {
            if (e.which === 27) {
                closeMenu()
            } else if (e.which === 32) {
                flowPallete = !flowPallete
                return false
            }
        }

        draw()
    </script>
</body>

</html>
